<!-- Architecture diagram for the "Why use ai-adapter?" section of the main README.
     Fallback colors baked in (no CSS var()) so GitHub renders it correctly
     in both repository preview and embedded in markdown. -->
<svg viewBox="0 0 920 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
<title id="t">Where ai-adapter sits in the camera-security stack</title>
<desc id="d">Camera frames flow through a monitoring app, KAI-C, and an adapter. The adapter layer adds correlation_id, audit, fingerprint drift detection, permissions, sovereignty enforcement, fair queuing, and process isolation that direct model loading does not.</desc>
<defs>
  <style>
    .label{font-family:ui-sans-serif,system-ui,sans-serif;font-size:13px;fill:#1a1a1a}
    .small{font-family:ui-sans-serif,system-ui,sans-serif;font-size:11px;fill:#5c5c5c}
    .tag{font-family:ui-sans-serif,system-ui,sans-serif;font-size:10px;fill:#1a1a1a}
    .title{font-family:ui-sans-serif,system-ui,sans-serif;font-size:14px;font-weight:600;fill:#1a1a1a}
    .legend{font-family:ui-sans-serif,system-ui,sans-serif;font-size:11px;fill:#404040}
    .box{fill:#f7f7f5;stroke:#d4d4d2;stroke-width:1}
    .core{fill:#e7d4b8;stroke:#a87c4f;stroke-width:1}
    .arrow{stroke:#5c5c5c;stroke-width:1.4;fill:none;marker-end:url(#arr)}
    .audit{stroke:#a87c4f;stroke-width:1;stroke-dasharray:4 3;fill:none;marker-end:url(#arrAccent)}
  </style>
  <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0,0 L10,5 L0,10 Z" fill="#5c5c5c"/>
  </marker>
  <marker id="arrAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0,0 L10,5 L0,10 Z" fill="#a87c4f"/>
  </marker>
</defs>

<!-- Title -->
<text x="460" y="24" text-anchor="middle" class="title">Why use ai-adapter instead of loading YOLO directly</text>

<!-- Top row: direct path -->
<text x="40" y="60" class="small">Direct YOLO load (hobby DIY):</text>
<rect x="40" y="72" width="120" height="44" rx="6" class="box"/>
<text x="100" y="92" text-anchor="middle" class="label">Camera</text>
<text x="100" y="106" text-anchor="middle" class="small">RTSP / JPEG</text>
<path d="M165,94 L195,94" class="arrow"/>
<rect x="200" y="72" width="140" height="44" rx="6" class="box"/>
<text x="270" y="92" text-anchor="middle" class="label">Your script</text>
<text x="270" y="106" text-anchor="middle" class="small">model = YOLO(...)</text>
<text x="350" y="100" class="small">— that's it. Works. &#10003;</text>

<!-- Divider -->
<line x1="40" y1="138" x2="880" y2="138" stroke="#d4d4d2" stroke-width="1" stroke-dasharray="2 3"/>

<text x="40" y="162" class="small">Camera-security product (what ai-adapter is for):</text>

<!-- Layered stack -->
<!-- Monitoring app -->
<rect x="40" y="180" width="140" height="58" rx="6" class="box"/>
<text x="110" y="200" text-anchor="middle" class="label">Monitoring app</text>
<text x="110" y="216" text-anchor="middle" class="small">intrusion-detection</text>
<text x="110" y="230" text-anchor="middle" class="small">(zones, hours, alerts)</text>

<path d="M185,209 L235,209" class="arrow"/>
<text x="210" y="200" text-anchor="middle" class="tag">JPEG</text>

<!-- KAI-C -->
<rect x="240" y="180" width="160" height="58" rx="6" class="core"/>
<text x="320" y="200" text-anchor="middle" class="label">KAI-C</text>
<text x="320" y="216" text-anchor="middle" class="small">registry &#183; audit &#183; auth</text>
<text x="320" y="230" text-anchor="middle" class="small">sovereignty gate</text>

<path d="M405,209 L455,209" class="arrow"/>
<text x="430" y="200" text-anchor="middle" class="tag">contract</text>

<!-- Adapter -->
<rect x="460" y="180" width="160" height="58" rx="6" class="core"/>
<text x="540" y="200" text-anchor="middle" class="label">Adapter (SDK)</text>
<text x="540" y="216" text-anchor="middle" class="small">/health &#183; /capabilities</text>
<text x="540" y="230" text-anchor="middle" class="small">/infer &#183; /metrics</text>

<path d="M625,209 L675,209" class="arrow"/>

<!-- Model -->
<rect x="680" y="180" width="160" height="58" rx="6" class="box"/>
<text x="760" y="200" text-anchor="middle" class="label">Model runtime</text>
<text x="760" y="216" text-anchor="middle" class="small">ultralytics, ONNX,</text>
<text x="760" y="230" text-anchor="middle" class="small">faster-whisper, &#8230;</text>

<!-- Audit trail arrow (return) -->
<path d="M760,238 Q760,290 540,290 Q320,290 320,238" class="audit"/>
<text x="540" y="305" text-anchor="middle" class="legend">audit chain (correlation_id, fingerprint, latency) &#8212;&#8594; joins back to alert</text>

<!-- What the layer adds -->
<text x="460" y="346" text-anchor="middle" class="title">What this layer adds that loading YOLO directly does NOT</text>

<!-- Concern boxes 3x3 -->
<g>
  <rect x="40" y="362" width="260" height="46" rx="6" class="box"/>
  <text x="52" y="380" class="label">1. Audit + correlation_id</text>
  <text x="52" y="396" class="small">Every call traceable from alert &#8594; KAI-C &#8594; adapter line.</text>
</g>
<g>
  <rect x="320" y="362" width="260" height="46" rx="6" class="box"/>
  <text x="332" y="380" class="label">2. Fingerprint drift detection</text>
  <text x="332" y="396" class="small">sha256 of weights polled every 60s &#8212; spots tampering.</text>
</g>
<g>
  <rect x="600" y="362" width="280" height="46" rx="6" class="box"/>
  <text x="612" y="380" class="label">3. Sovereignty (local_only mode)</text>
  <text x="612" y="396" class="small">KAI-C refuses adapters that declare network_egress.</text>
</g>

<g>
  <rect x="40" y="416" width="260" height="46" rx="6" class="box"/>
  <text x="52" y="434" class="label">4. Operator permissions (&#167;8)</text>
  <text x="52" y="450" class="small">GPU, filesystem, network &#8212; declared + approved.</text>
</g>
<g>
  <rect x="320" y="416" width="260" height="46" rx="6" class="box"/>
  <text x="332" y="434" class="label">5. Process isolation</text>
  <text x="332" y="450" class="small">Model crash doesn't take down alerts pipeline.</text>
</g>
<g>
  <rect x="600" y="416" width="280" height="46" rx="6" class="box"/>
  <text x="612" y="434" class="label">6. Hot-swap any model</text>
  <text x="612" y="450" class="small">YOLOv8 &#8594; YOLOv11 &#8594; cloud, no monitoring app changes.</text>
</g>

<g>
  <rect x="40" y="470" width="260" height="46" rx="6" class="box"/>
  <text x="52" y="488" class="label">7. Multi-tenant fair queuing</text>
  <text x="52" y="504" class="small">N apps share 1 adapter; chatty camera can't starve rest.</text>
</g>
<g>
  <rect x="320" y="470" width="260" height="46" rx="6" class="box"/>
  <text x="332" y="488" class="label">8. Typed &#167;7 error envelope</text>
  <text x="332" y="504" class="small">Same shape across HTTP + WS; clients write one parser.</text>
</g>
<g>
  <rect x="600" y="470" width="280" height="46" rx="6" class="box"/>
  <text x="612" y="488" class="label">9. Prometheus metrics out of the box</text>
  <text x="612" y="504" class="small">latency, outcome, in-flight, model_loaded &#8212; no glue.</text>
</g>
</svg>
